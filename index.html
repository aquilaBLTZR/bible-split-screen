<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Full Screen 4-Image Collage</title>
<style>
html, body {
  margin: 0;
  height: 100%;
  width: 100%;
  font-family: Arial, sans-serif;
  overflow: hidden; /* Prevent scrolling */
  background-size: cover;
  background-position: center;
}

#topBar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  background: #222;
  color: white;
  flex-wrap: wrap;
  box-sizing: border-box;
}

button, input[type=range] {
  cursor: pointer;
}

#dropZone {
  border: 2px dashed #666;
  padding: 10px;
  text-align: center;
  background: white;
  margin: 10px;
}

#removeButtons {
  display: flex;
  gap: 10px;
  padding: 10px;
  flex-wrap: wrap;
}

#grid {
  display: grid;
  gap: 2px;
  /* 2x2 layout fills remaining viewport */
  width: 100vw;
  height: calc(100vh - 120px); /* Account for top bar + remove buttons + dropZone */
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
}

#grid img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.2s;
}
</style>
</head>
<body>

<div id="topBar">
  <button id="bgBtn">Set Background</button>
  <label>Collage Scale:</label>
  <input type="range" id="sizeSlider" min="0.5" max="2" step="0.1" value="1">
  <button onclick="exportImage()">Export Image</button>
  <button onclick="openFullscreen()">Full Screen</button>
</div>

<div id="dropZone">📂 Drag & Drop Images Here (Max 4)</div>
<div id="removeButtons"></div>
<div id="grid"></div>

<script>
let images = [];
let collageScale = 1;

const dropZone = document.getElementById('dropZone');
const grid = document.getElementById('grid');
const bgBtn = document.getElementById('bgBtn');
const sizeSlider = document.getElementById('sizeSlider');
const removeButtonsDiv = document.getElementById('removeButtons');

// Drag & drop images
dropZone.addEventListener('dragover', e => e.preventDefault());
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
});

// Background image picker
bgBtn.addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = ev => {
        document.body.style.backgroundImage = `url(${ev.target.result})`;
      };
      reader.readAsDataURL(file);
    }
  };
  input.click();
});

// Handle uploaded images
function handleFiles(files) {
  for (let file of files) {
    if (file.type.startsWith('image/') && images.length < 4) {
      const reader = new FileReader();
      reader.onload = e => {
        images.push({ src: e.target.result });
        renderGrid();
      };
      reader.readAsDataURL(file);
    }
  }
}

// Render collage
function renderGrid() {
  grid.innerHTML = '';
  images.forEach((imgData) => {
    const img = document.createElement('img');
    img.src = imgData.src;
    img.style.transform = `scale(${collageScale})`;
    grid.appendChild(img);
  });

  // Remove buttons
  removeButtonsDiv.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const btn = document.createElement('button');
    btn.innerText = `Remove Image ${i + 1}`;
    btn.disabled = !images[i];
    btn.onclick = () => {
      if (images[i]) {
        images.splice(i, 1);
        renderGrid();
      }
    };
    removeButtonsDiv.appendChild(btn);
  }
}

// Collage universal scale
sizeSlider.addEventListener('input', () => {
  collageScale = sizeSlider.value;
  renderGrid();
});

// Export collage
function exportImage() {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const size = 300;
  canvas.width = 2 * size;
  canvas.height = 2 * size;

  images.forEach((imgData, i) => {
    const img = new Image();
    img.src = imgData.src;
    img.onload = () => {
      const x = (i % 2) * size;
      const y = Math.floor(i / 2) * size;
      ctx.drawImage(img, x, y, size * collageScale, size * collageScale);
    };
  });

  setTimeout(() => {
    const link = document.createElement('a');
    link.download = 'collage.png';
    link.href = canvas.toDataURL();
    link.click();
  }, 500);
}

// Full screen tab
function openFullscreen() {
  const newTab = window.open();
  let html = `<html><body style="margin:0;display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);">`;
  images.forEach(img => {
    html += `<img src="${img.src}" style="width:100%;height:100%;object-fit:cover;transform:scale(${collageScale})">`;
  });
  html += `</body></html>`;
  newTab.document.write(html);
}

// Make grid resize when window changes
window.addEventListener('resize', renderGrid);
</script>

</body>
</html>
